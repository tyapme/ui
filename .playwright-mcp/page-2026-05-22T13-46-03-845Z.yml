            - paragraph [ref=e274]: TYAP.ME UI は TYAP.ME のプロダクト画面を一貫して組み立てるための UI ドキュメントです。
          - generic [ref=e275]:
            - paragraph [ref=e276]: TYAP.ME UI は、TYAP.ME の画面で使うコンポーネント、テーマ、フォーム、実装ルールをまとめたプロダクト UI の基盤です。
            - paragraph [ref=e277]: 目的は、画面ごとの例外を増やさず、同じ役割の UI を同じ見た目と挙動で実装できる状態を保つことです。
            - heading "方針" [level=2] [ref=e278]:
              - link "方針" [ref=e279] [cursor=pointer]:
                - /url: "#方針"
                - text: 方針#
            - list [ref=e280]:
              - listitem [ref=e281]:
                - strong [ref=e282]: "一貫性:"
                - text: コンポーネント、余白、色、タイポグラフィを共通ルールに揃える。
              - listitem [ref=e283]:
                - strong [ref=e284]: "再利用:"
                - text: 同じ役割の UI はページ単位で作らず、共通コンポーネントとして扱う。
              - listitem [ref=e285]:
                - strong [ref=e286]: "保守性:"
                - text: 実装・テスト・ドキュメントを同じ変更単位で更新する。
              - listitem [ref=e287]:
                - strong [ref=e288]: "プロダクト優先:"
                - text: TYAP.ME の勤務管理体験に必要な UI だけを残す。
            - heading "使い方" [level=2] [ref=e289]:
